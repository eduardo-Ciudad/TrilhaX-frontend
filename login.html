<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar — TrilhaX</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card glass-card">
        <a href="index.html" class="auth-logo">Trilha<span>X</span></a>
        <h1 class="auth-title">Entrar na sua conta</h1>

        <div class="form-error" id="form-error"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required />
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="••••••••" required />
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Entrar</button>
        </form>

        <p class="auth-footer-text">
          Não tem conta? <a href="register.html">Criar conta</a>
        </p>
        <p class="auth-back-link"><a href="index.html">Voltar para início</a></p>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
      const form = document.getElementById('login-form');
      const formError = document.getElementById('form-error');
      const submitBtn = document.getElementById('submit-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        formError.classList.remove('visible');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Entrando...';

        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        try {
          await login(email, senha);
          window.location.href = 'dashboard.html';
        } catch (err) {
          formError.textContent =
            err.message || 'Credenciais inválidas. Verifique seu email e senha.';
          formError.classList.add('visible');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Entrar';
        }
      });
    </script>
  </body>
</html>
